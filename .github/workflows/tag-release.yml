name: Tag release

# Creates an annotated tag on a chosen commit and a GitHub Release for
# it. Two triggers:
#   - workflow_dispatch with tag/sha/message inputs, or
#   - a commit to main adding a .release-request file whose first line
#     is: <tag> <sha> [message...]
# Optional: a .release-notes.md committed alongside the marker becomes
# the Release notes. Both steps are idempotent (existing tag/Release are
# left alone), and the marker files are removed when processed. The
# marker-file path exists for environments whose credentials can commit
# contents but cannot dispatch workflows or push tag refs.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.0)"
        required: true
      sha:
        description: "Commit SHA to tag (defaults to the dispatched ref's head)"
        required: false
        default: ""
      message:
        description: "Tag message"
        required: false
        default: ""
  push:
    branches: [main]
    paths: [".release-request"]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release request
        id: req
        env:
          IN_TAG: ${{ inputs.tag }}
          IN_SHA: ${{ inputs.sha }}
          IN_MSG: ${{ inputs.message }}
        run: |
          set -euo pipefail
          if [ -n "${IN_TAG:-}" ]; then
            tag="$IN_TAG"; sha="${IN_SHA:-$GITHUB_SHA}"; msg="${IN_MSG:-$IN_TAG}"
          elif [ -s .release-request ]; then
            read -r tag sha msg < .release-request
            sha="${sha:-$GITHUB_SHA}"
            msg="${msg:-$tag}"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No release request; nothing to do."
            exit 0
          fi
          {
            echo "skip=false"
            echo "tag=$tag"
            echo "sha=$sha"
            echo "msg=$msg"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push annotated tag
        if: steps.req.outputs.skip == 'false'
        env:
          TAG: ${{ steps.req.outputs.tag }}
          SHA: ${{ steps.req.outputs.sha }}
          MSG: ${{ steps.req.outputs.msg }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; leaving it as is."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$SHA" -m "$MSG"
          git push origin "refs/tags/$TAG"
          echo "Tagged $SHA as $TAG"

      - name: Create GitHub release
        if: steps.req.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.req.outputs.tag }}
          MSG: ${{ steps.req.outputs.msg }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it as is."
            exit 0
          fi
          if [ -s .release-notes.md ]; then
            gh release create "$TAG" --verify-tag --title "$TAG" --notes-file .release-notes.md
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --notes "$MSG"
          fi

      - name: Remove processed release request
        if: steps.req.outputs.skip == 'false' && hashFiles('.release-request') != ''
        env:
          TAG: ${{ steps.req.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -q .release-request
          if [ -f .release-notes.md ]; then
            git rm -q .release-notes.md
          fi
          git commit -m "Remove processed release request for $TAG"
          git push origin HEAD:main
