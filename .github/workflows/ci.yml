name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Fetch tla2tools.jar (for TLC integration tests)
        continue-on-error: true
        run: |
          curl -fsSL --retry 3 -o /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
            && echo "TLA2TOOLS_JAR=/tmp/tla2tools.jar" >> "$GITHUB_ENV" \
            || echo "jar download failed; integration tests will be skipped"

      - name: go test
        run: go test ./...
